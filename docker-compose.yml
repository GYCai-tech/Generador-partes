services:
  partes:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_SERVER:   ${DB_SERVER}
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER:   "ODBC Driver 18 for SQL Server"
      FLASK_DEBUG: "false"
    restart: unless-stopped
