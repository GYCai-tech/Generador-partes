<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generar Parte de Trabajo — GYC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#1a3a5c; --blue-mid:#254f7e; --blue-light:#e8f0f9;
  --orange:#e8720c; --orange-h:#c95e08;
  --ink:#111827; --muted:#6b7280; --border:#d1d9e0;
  --bg:#f4f6f9; --white:#fff; --paper:#fdfcfa; --rule:#dde3eb;
  --shadow-sm:0 1px 3px rgba(26,58,92,.08);
  --shadow-md:0 4px 16px rgba(26,58,92,.12),0 2px 6px rgba(26,58,92,.08);
  --shadow-lg:0 12px 40px rgba(26,58,92,.16);
  --r:6px;
  --fh:'Barlow Condensed',sans-serif;
  --fb:'Barlow',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --t:170ms cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);font-size:16px;background:var(--bg);color:var(--ink);min-height:100vh}

/* HEADER */
.header{background:var(--blue);height:52px;display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{display:flex;align-items:center}
.logo img{height:32px;filter:brightness(0) invert(1);display:block}
.hdiv{width:1px;height:26px;background:rgba(255,255,255,.2)}
.hsub{font-family:var(--fh);font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5)}

/* LAYOUT */
.main{max-width:1400px;margin:0 auto;padding:32px 28px 80px;display:flex;flex-direction:column;gap:28px}

/* STEP */
.step-label{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-family:var(--fh);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-family:var(--fh);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

/* SEARCH */
.search-top{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.search-top .search-box{flex:1;margin-bottom:0}
.filter-tabs{display:flex;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:3px;gap:2px;box-shadow:var(--shadow-sm);flex-shrink:0}
.ftab{flex:1;border:none;background:transparent;padding:6px 8px;font-family:var(--fb);font-size:12px;font-weight:500;color:var(--muted);border-radius:4px;cursor:pointer;transition:all var(--t)}
.ftab:hover{color:var(--blue);background:var(--blue-light)}
.ftab.active{background:var(--blue);color:#fff;box-shadow:0 1px 4px rgba(26,58,92,.3)}

/* MODE TABS */
.mode-tabs{display:flex;gap:0;margin-bottom:16px;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm)}
.mtab{flex:1;border:none;background:var(--white);padding:10px 16px;font-family:var(--fh);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all var(--t);border-right:1px solid var(--border)}
.mtab:last-child{border-right:none}
.mtab:hover{background:var(--blue-light);color:var(--blue)}
.mtab.active-parte{background:var(--blue);color:#fff}
.mtab.active-pedido{background:var(--orange);color:#fff}

/* CARD distinción parte vs pedido */
.rcard.tipo-pedido::before{background:var(--orange) !important}
.rcard.tipo-pedido:hover{border-color:var(--orange) !important}
.rcard.tipo-pedido .rnum{background:var(--orange)}
.rcard.tipo-pedido.sel{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,114,12,.12),var(--shadow-md)}

.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:10px 40px 10px 14px;font-family:var(--fb);font-size:14px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--white);color:var(--ink);outline:none;transition:border-color var(--t),box-shadow var(--t);box-shadow:var(--shadow-sm)}
.search-box input:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(37,79,126,.12)}
.search-box input::placeholder{color:#b0b8c4}
.sico{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

.spinner{display:none;width:17px;height:17px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin:7px auto}
.spinner.on{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

.results-area{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.results-area.has-results{padding-bottom:4px}

.empty-msg{text-align:center;padding:28px 16px;color:var(--muted);font-size:12px}
.empty-msg svg{display:block;margin:0 auto 9px;opacity:.3}

.rcard{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 14px;cursor:pointer;transition:all var(--t);box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.rcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background var(--t)}
.rcard:hover{border-color:var(--blue-mid);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.rcard:hover::before{background:var(--blue-mid)}
.rcard.sel{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,114,12,.12),var(--shadow-md)}
.rcard.sel::before{background:var(--orange)}
.rtop{display:flex;flex-direction:column;gap:3px;margin-bottom:3px}
.rcli{font-family:var(--fb);font-size:14px;font-weight:600;color:var(--blue);line-height:1.35;white-space:normal;word-break:break-word}
.rnum{font-family:var(--fm);font-size:10px;color:#fff;background:var(--blue);padding:2px 7px;border-radius:4px;align-self:flex-start}
.rcard.sel .rnum{background:var(--orange)}
.rdir{font-size:11.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rmeta{margin-top:6px;display:flex;gap:9px;align-items:center}
.rdate{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px}
.rtel{font-family:var(--fm);font-size:10px;color:var(--muted)}

/* FORM PANEL */
.form-panel{display:flex;flex-direction:column;gap:0}

.actions-bar{display:flex;gap:9px;margin-bottom:10px;justify-content:flex-end;align-items:center}
.btn{display:flex;align-items:center;gap:5px;padding:7px 16px;font-family:var(--fb);font-size:13px;font-weight:500;border-radius:var(--r);cursor:pointer;transition:all var(--t);border:1.5px solid transparent}
.btn-ghost{color:var(--muted);background:var(--white);border-color:var(--border)}
.btn-ghost:hover{color:var(--blue);border-color:var(--blue-mid);background:var(--blue-light)}
.btn-primary{color:#fff;background:var(--orange);border-color:var(--orange);font-weight:600;box-shadow:0 2px 8px rgba(232,114,12,.35)}
.btn-primary:hover{background:var(--orange-h);border-color:var(--orange-h);box-shadow:0 4px 12px rgba(232,114,12,.45);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* THE FORM CARD */
.doc-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow-lg);overflow:hidden;opacity:.5;filter:saturate(.3);transition:opacity .3s,filter .3s}
.doc-card.filled{opacity:1;filter:none}

.doc-header{background:var(--blue);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:16px 24px;gap:14px}
.dlogo{display:flex;align-items:center;background:#fff;border-radius:6px;padding:7px 14px}
.dlogo img{height:46px;display:block}
.dtitle{font-family:var(--fh);font-size:16px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.9);text-align:center;white-space:nowrap}
.dright{font-family:var(--fh);font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.06em;text-align:right}

/* Sections */
.sec-hdr{background:var(--blue);padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.sec-hdr span{font-family:var(--fh);font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.85)}
.op-ctrl{display:flex;gap:6px}
.op-btn{width:26px;height:26px;border:none;border-radius:4px;background:rgba(255,255,255,.15);color:#fff;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--t)}
.op-btn:hover{background:rgba(255,255,255,.3)}
.op-btn:disabled{opacity:.3;cursor:not-allowed}

/* Field rows */
.frow{display:grid;border-bottom:1px solid var(--rule);min-height:54px}
.frow:last-child{border-bottom:none}
.frow-2{grid-template-columns:3fr 2fr}
.frow-alb{grid-template-columns:auto 80px auto 1fr}
.frow-1{grid-template-columns:1fr}
.frow-addr{grid-template-columns:55% 45%}

.fcell{padding:10px 18px;display:flex;align-items:center;gap:10px;border-right:1px solid var(--rule);min-height:54px}
.fcell:last-child{border-right:none}

.flbl{font-family:var(--fh);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;flex-shrink:0}

.fi{flex:1;border:none;background:transparent;font-family:var(--fb);font-size:16px;font-weight:500;color:var(--ink);outline:none;padding:0;min-width:0;width:100%;transition:background var(--t),padding var(--t)}
.fi:hover{background:rgba(37,79,126,.04);border-radius:3px;padding:2px 5px}
.fi:focus{background:rgba(232,114,12,.06);border-radius:3px;padding:3px 6px;box-shadow:0 0 0 2px rgba(232,114,12,.2)}
.fi::placeholder{color:#c0c8d4;font-weight:400}
.fi.mono{font-family:var(--fm);font-size:15px;color:var(--blue-mid)}
.fi.large{font-family:var(--fh);font-size:20px;font-weight:700;color:var(--blue)}
.fi.orange{color:var(--orange)}
.fi.gps{font-family:var(--fm);font-size:14px;color:var(--blue-mid)}
.frow.gps-row{background:rgba(232,114,12,.025)}

/* Conceptos table */
.tbl-wrap{border-bottom:1px solid var(--rule)}
.tbl-hdr{display:grid;background:#f0f3f6;border-bottom:1px solid var(--rule)}
.tbl-row{display:grid;border-bottom:1px solid var(--rule)}
.tbl-row:last-child{border-bottom:none}
.tc{padding:8px 12px;font-family:var(--fh);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--rule)}
.tc:last-child{border-right:none}
.td{padding:7px 10px;border-right:1px solid var(--rule)}
.td:last-child{border-right:none}
.td input,.td textarea{width:100%;border:none;background:transparent;font-family:var(--fb);font-size:14px;color:var(--ink);outline:none;padding:0}
.td input:focus,.td textarea:focus{background:rgba(232,114,12,.06);border-radius:3px;padding:2px 5px}
.td textarea{resize:none;line-height:1.5}

/* 5-col horas table */
.horas-tbl .tc,.horas-tbl .td{padding:7px 10px}

/* Gastos 2x2 */
.gastos-block{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--rule)}
.gastos-op{border-right:1px solid var(--border)}
.gastos-op:nth-child(2n){border-right:none}
.gastos-op-hdr{background:#f0f3f6;padding:7px 14px;font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);border-bottom:1px solid var(--rule)}
.gastos-row{display:grid;grid-template-columns:auto 1fr 100px;border-bottom:1px solid var(--rule);align-items:center}
.gastos-row .glbl{padding:7px 12px;font-size:13px;color:var(--muted);font-family:var(--fb);white-space:nowrap}
.gastos-row .gval{padding:5px 8px;border-left:1px solid var(--rule);border-right:1px solid var(--rule)}
.gastos-row .gval input{width:100%;border:none;background:transparent;font-size:14px;outline:none;font-family:var(--fm)}
.gastos-row .gval input:focus{background:rgba(232,114,12,.06);border-radius:2px}
.gastos-row .gtot{padding:5px 8px}
.gastos-row .gtot input{width:100%;border:none;background:transparent;font-size:14px;outline:none;font-family:var(--fm);text-align:right}

/* Add row btn */
.add-row-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;font-size:13px;color:var(--blue-mid);background:transparent;border:none;cursor:pointer;font-family:var(--fb);transition:color var(--t)}
.add-row-btn:hover{color:var(--orange)}

/* Observaciones textarea */
.obs-ta{width:100%;border:none;background:transparent;font-family:var(--fb);font-size:16px;color:var(--ink);outline:none;padding:12px 18px;resize:vertical;min-height:100px;line-height:1.6}
.obs-ta:focus{background:rgba(232,114,12,.04)}

/* Doc empty */
.doc-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:44px 20px;color:var(--muted);opacity:.5;text-align:center}
.doc-empty p{font-size:12px;line-height:1.6}

/* Fotos */
.fotos-section{padding:14px 18px;border-bottom:1px solid var(--rule);display:flex;flex-direction:column;gap:12px}
.foto-upload-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:var(--blue-light);color:var(--blue-mid);border:1.5px dashed var(--blue-mid);border-radius:var(--r);cursor:pointer;font-family:var(--fb);font-size:14px;font-weight:500;transition:all var(--t);align-self:flex-start}
.foto-upload-btn:hover{background:var(--blue-mid);color:#fff;border-style:solid}
.fotos-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.foto-thumb{position:relative;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;aspect-ratio:4/3;background:#f8f8f8}
.foto-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.foto-remove{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;transition:background var(--t)}
.foto-remove:hover{background:rgba(200,30,30,.85)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--blue);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:9px;transform:translateY(70px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#16a34a}

@media(max-width:700px){.results-area{grid-template-columns:1fr}.search-top{flex-direction:column;align-items:stretch}.frow-2,.frow-addr{grid-template-columns:1fr}.fcell{border-right:none;border-bottom:1px solid var(--rule)}.gastos-block{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="header">
  <div class="logo"><img src="/static/logo.png" alt="Gómez y Crespo"></div>
  <div class="hdiv"></div>
  <span class="hsub">Generar Parte de Trabajo</span>
</header>

<main class="main">

<!-- ── BÚSQUEDA ── -->
<section>
  <div class="step-label">
    <div class="step-num">1</div>
    <span class="step-title">Selecciona el parte o el pedido</span>
  </div>

  <div class="mode-tabs">
    <button class="mtab active-parte" id="modePartes" data-modo="partes">Partes de trabajo</button>
    <button class="mtab" id="modePedidos" data-modo="pedidos">Pedidos de cliente</button>
  </div>

  <div class="search-top">
    <div class="filter-tabs" role="group">
      <button class="ftab active" data-tipo="todo">Todos</button>
      <button class="ftab" data-tipo="numero" id="ftabNumero">Nº Parte</button>
      <button class="ftab" data-tipo="cliente">Cliente</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Nombre de cliente o número de parte…" autocomplete="off" autofocus>
      <span class="sico">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="6"/><line x1="14" y1="14" x2="19" y2="19"/></svg>
      </span>
    </div>
    <div class="spinner" id="spinner"></div>
  </div>

  <div class="results-area" id="resultsArea">
    <div class="empty-msg" style="grid-column:1/-1">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-4.35-4.35M11 19A8 8 0 1 0 11 3a8 8 0 0 0 0 16z"/></svg>
      Busca un parte para generar el PDF
    </div>
  </div>
</section>

<!-- ── FORMULARIO (se muestra al seleccionar) ── -->
<section class="form-panel" id="formSection" style="display:none">
  <div class="step-label">
    <div class="step-num">2</div>
    <span class="step-title">Revisa los datos y descarga el PDF</span>
    <span id="editBadge" style="display:none;margin-left:auto;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--orange);background:rgba(232,114,12,.1);padding:2px 9px;border-radius:20px;">✏ Todos los campos son editables</span>
  </div>

  <div class="actions-bar">
    <button class="btn btn-ghost" id="btnLimpiar">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Limpiar
    </button>
    <button class="btn btn-primary" id="btnGenerar" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Descargar PDF
    </button>
  </div>

  <div class="doc-card" id="docCard">
    <!-- Header -->
    <div class="doc-header">
      <div class="dlogo"><img src="/static/logo.png" alt="Gómez y Crespo"></div>
      <div class="dtitle">Parte de Trabajo<span id="docIdParte" style="display:none;margin-left:10px;font-size:11px;font-weight:400;opacity:.6;letter-spacing:.06em"></span></div>
      <div class="dright">GÓMEZ Y CRESPO</div>
    </div>

    <div id="docBody">
      <div class="doc-empty">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
        <p>Selecciona un pedido<br>para rellenar el parte</p>
      </div>
    </div>
  </div>
</section>

</main>

<div class="toast" id="toast"></div>

<script>
let tipo = 'todo', modo = 'partes', debounce = null, selCard = null;
let _parteData = null;
let nextNum = '';

fetch('/api/siguiente-numero').then(r=>r.json()).then(d=>{ nextNum = d.formato; });

// Mode tabs
document.querySelectorAll('.mtab').forEach(b=>{
  b.addEventListener('click',()=>{
    modo = b.dataset.modo;
    document.querySelectorAll('.mtab').forEach(x=>{ x.classList.remove('active-parte','active-pedido'); });
    b.classList.add(modo === 'partes' ? 'active-parte' : 'active-pedido');
    const ftabNum = document.getElementById('ftabNumero');
    ftabNum.textContent = modo === 'partes' ? 'Nº Parte' : 'Nº Pedido';
    const inp = document.getElementById('searchInput');
    inp.placeholder = modo === 'partes' ? 'Nombre de cliente o número de parte…' : 'Nombre de cliente o número de pedido…';
    const q = inp.value.trim();
    if(q) buscar(q); else showEmpty(modo === 'partes' ? 'Busca un parte para generar el PDF' : 'Busca un pedido para generar el parte');
  });
});

// Filter tabs
document.querySelectorAll('.ftab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); tipo = b.dataset.tipo;
    const q = document.getElementById('searchInput').value.trim();
    if(q) buscar(q);
  });
});

document.getElementById('searchInput').addEventListener('input', e=>{
  clearTimeout(debounce);
  const q = e.target.value.trim();
  if(!q){ showEmpty(modo === 'partes' ? 'Busca un parte para generar el PDF' : 'Busca un pedido para generar el parte'); return; }
  debounce = setTimeout(()=>buscar(q), 300);
});

document.getElementById('btnLimpiar').addEventListener('click',()=>{
  document.getElementById('searchInput').value='';
  showEmpty(modo === 'partes' ? 'Busca un parte para generar el PDF' : 'Busca un pedido para generar el parte');
  resetDoc();
  if(selCard){selCard.classList.remove('sel');selCard=null;}
  document.getElementById('btnGenerar').disabled=true;
  document.getElementById('formSection').style.display='none';
  _parteData = null;
});

document.getElementById('btnGenerar').addEventListener('click', generarPDF);

function showEmpty(msg){
  document.getElementById('resultsArea').innerHTML=`<div class="empty-msg" style="grid-column:1/-1"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-4.35-4.35M11 19A8 8 0 1 0 11 3a8 8 0 0 0 0 16z"/></svg>${esc(msg)}</div>`;
}

async function buscar(q){
  document.getElementById('spinner').classList.add('on');
  try{
    const url = modo === 'partes'
      ? `/api/buscar-parte?q=${encodeURIComponent(q)}&tipo=${tipo}`
      : `/api/buscar?q=${encodeURIComponent(q)}&tipo=${tipo}`;
    const data = await fetch(url).then(r=>r.json());
    renderResults(data);
  }catch{ showEmpty('Error de conexión'); }
  finally{ document.getElementById('spinner').classList.remove('on'); }
}

function renderResults(items){
  const area = document.getElementById('resultsArea');
  if(!items.length){ showEmpty(modo === 'partes' ? 'No se encontraron partes' : 'No se encontraron pedidos'); return; }
  const esParte = modo === 'partes';
  area.innerHTML = items.map((it,i)=>`
    <div class="rcard${esParte ? '' : ' tipo-pedido'}" data-idx="${i}" style="animation-delay:${i*22}ms">
      <div class="rtop">
        <div class="rcli">${esc(it.Cliente||it.IdCliente)}</div>
        <div class="rnum">${esParte ? 'Parte nº '+esc(it.NumParteFormato) : 'Pedido nº '+esc(String(it.NumPedido))}</div>
      </div>
      <div class="rdir">${esc(it.DireccionTrabajo)}${it.LocalidadTrabajo?' — '+it.LocalidadTrabajo:''}</div>
      <div class="rmeta">
        <span class="rdate"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${esc(it.FechaFormateada)}</span>
        ${it.Contacto?`<span class="rtel">${esc(it.Contacto)}</span>`:''}
      </div>
    </div>`).join('');
  area._data = items;
  area.querySelectorAll('.rcard').forEach(card=>{
    card.addEventListener('click', async ()=>{
      if(selCard) selCard.classList.remove('sel');
      card.classList.add('sel'); selCard = card;
      const it = area._data[parseInt(card.dataset.idx)];
      document.getElementById('spinner').classList.add('on');
      try {
        let pd;
        if(modo === 'partes'){
          pd = await fetch(`/api/parte/${it.IdParte}`).then(r=>r.json());
        } else {
          pd = pedidoToParteData(it);
        }
        _parteData = pd;
        fillDoc(pd);
        document.getElementById('btnGenerar').disabled=false;
        const fs = document.getElementById('formSection');
        fs.style.display='flex';
        setTimeout(()=>fs.scrollIntoView({behavior:'smooth',block:'start'}), 50);
      } catch(e) {
        showToast('Error al cargar los datos','');
      } finally {
        document.getElementById('spinner').classList.remove('on');
      }
    });
  });
}

function pedidoToParteData(it){
  return {
    albaran: nextNum,
    presupuesto: '',
    cliente: it.Cliente || it.IdCliente || '',
    direccion: it.DireccionTrabajo || '',
    localidad: it.LocalidadTrabajo || '',
    contacto: it.Contacto || '',
    gps: '',
    fecha: it.FechaFormateada || '',
    observaciones: it.Observaciones || '',
    conceptos: [{ cant: '1', concepto: it.Observaciones || '' }],
    operarios: [{ nombre: '' }, { nombre: '' }],
    horas: [],
    gastos: [],
  };
}

function fillDoc(it){
  document.getElementById('docCard').classList.add('filled');
  document.getElementById('editBadge').style.display='inline-flex';
  const idEl = document.getElementById('docIdParte');
  if(it.id_parte){ idEl.textContent = `· ID ${it.id_parte}`; idEl.style.display='inline'; }
  else { idEl.style.display='none'; }

  const conceptosHtml = (it.conceptos||[]).map(c=>`
    <div class="tbl-row" style="grid-template-columns:42px 1fr">
      <div class="td"><input type="number" value="${esc(c.cant||'1')}" min="0" style="width:100%;text-align:center"></div>
      <div class="td"><input type="text" value="${esc(c.concepto||'')}" placeholder="Descripción del trabajo…"></div>
    </div>`).join('') || `
    <div class="tbl-row" style="grid-template-columns:42px 1fr">
      <div class="td"><input type="number" value="1" min="0" style="width:100%;text-align:center"></div>
      <div class="td"><input type="text" value="" placeholder="Descripción del trabajo…"></div>
    </div>`;

  document.getElementById('docBody').innerHTML = `

  <!-- Albarán / Presupuesto -->
  <div class="frow frow-alb" style="background:#f0f3f6">
    <div class="fcell"><span class="flbl">Albarán nº</span></div>
    <div class="fcell" style="padding:5px 8px"><input class="fi mono orange" id="f_albaran" value="${esc(it.albaran||'')}" style="font-size:13px;font-weight:700"></div>
    <div class="fcell"><span class="flbl">Presupuesto</span></div>
    <div class="fcell"><input class="fi orange" id="f_presupuesto" value="${esc(it.presupuesto||'')}" placeholder="—" style="font-size:12px"></div>
  </div>

  <!-- Cliente -->
  <div class="frow frow-1">
    <div class="fcell">
      <span class="flbl">Cliente</span>
      <input class="fi large" id="f_cliente" value="${esc(it.cliente||'')}">
    </div>
  </div>

  <!-- Dirección -->
  <div class="frow frow-addr">
    <div class="fcell">
      <span class="flbl">Dirección de trabajo</span>
      <input class="fi" id="f_direccion" value="${esc(it.direccion||'')}">
    </div>
    <div class="fcell">
      <input class="fi" id="f_localidad" value="${esc(it.localidad||'')}" placeholder="Localidad">
    </div>
  </div>

  <!-- Contacto -->
  <div class="frow frow-1">
    <div class="fcell">
      <span class="flbl">Contacto</span>
      <input class="fi mono" id="f_contacto" value="${esc(it.contacto||'')}" placeholder="Teléfono">
    </div>
  </div>

  <!-- GPS -->
  <div class="frow frow-1 gps-row">
    <div class="fcell">
      <span class="flbl">GPS</span>
      <input class="fi gps" id="f_gps" value="${esc(it.gps||'')}" placeholder="00.00000, 00.00000">
    </div>
  </div>

  <!-- Fecha -->
  <div class="frow frow-1">
    <div class="fcell">
      <span class="flbl">Fecha</span>
      <input class="fi mono" id="f_fecha" value="${esc(it.fecha||'')}" style="color:var(--blue)">
    </div>
  </div>

  <!-- ══ FACTURACIÓN ══ -->
  <div class="sec-hdr"><span>Facturación</span></div>
  <div class="tbl-wrap">
    <div class="tbl-hdr" style="grid-template-columns:42px 1fr">
      <div class="tc">Cant.</div><div class="tc">Conceptos de trabajo</div>
    </div>
    <div id="conceptosRows">${conceptosHtml}</div>
    <div style="padding:2px 6px">
      <button class="add-row-btn" onclick="addConcepto()">+ Añadir línea</button>
    </div>
  </div>

  <!-- ══ OPERARIOS ══ -->
  <div class="sec-hdr">
    <span>Nombre Operarios</span>
    <div class="op-ctrl">
      <button type="button" class="op-btn" id="btnRemoveOp" onclick="removeOperario()" title="Eliminar operario">−</button>
      <button type="button" class="op-btn" onclick="addOperario()" title="Añadir operario">+</button>
    </div>
  </div>
  <div id="operariosRows"></div>

  <!-- ══ HORAS ══ -->
  <div class="sec-hdr">
    <span>Horas Empleadas</span>
    <div class="op-ctrl">
      <button type="button" class="op-btn" id="btnRemoveHora" onclick="removeHora()" title="Eliminar fila">−</button>
      <button type="button" class="op-btn" onclick="addHora()" title="Añadir fila">+</button>
    </div>
  </div>
  <div class="tbl-wrap horas-tbl">
    <div class="tbl-hdr" style="grid-template-columns:60px 70px 70px 55px 1fr">
      <div class="tc">Día</div>
      <div class="tc">H. Inicio</div>
      <div class="tc">H. Final</div>
      <div class="tc">Operarios</div>
      <div class="tc">Definición del trabajo</div>
    </div>
    <div id="horasRows"></div>
  </div>
  <div style="padding:2px 6px">
    <button class="add-row-btn" onclick="addHora()">+ Añadir día</button>
  </div>

  <!-- ══ OBSERVACIONES ══ -->
  <div class="sec-hdr"><span>Observaciones</span></div>
  <div style="border-bottom:1px solid var(--rule)">
    <textarea class="obs-ta" id="f_obs" placeholder="Observaciones…" rows="3">${esc(it.observaciones||'')}</textarea>
  </div>

  <!-- ══ GASTOS ══ -->
  <div class="sec-hdr"><span>Gastos Imputables</span></div>
  <div class="gastos-block" id="gastosBlock"></div>

  <!-- ══ FIRMAS ══ -->
  <div class="sec-hdr"><span>Firmas</span></div>
  <div class="frow frow-2" style="min-height:80px">
    <div class="fcell" style="align-items:flex-start;padding-top:10px">
      <span class="flbl">Operarios</span>
    </div>
    <div class="fcell" style="align-items:flex-start;padding-top:10px">
      <span class="flbl">VºBº Cliente</span>
    </div>
  </div>

  <!-- ══ FOTOS ══ -->
  <div class="sec-hdr"><span>Fotografías</span></div>
  <div class="fotos-section">
    <label class="foto-upload-btn" for="fotoInput">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Añadir fotos
    </label>
    <input type="file" id="fotoInput" multiple accept="image/*" style="display:none" onchange="handleFotos(this)">
    <div id="fotosPreview" class="fotos-preview"></div>
  </div>
  `;

  // Operarios precargados desde BD
  const opsBD = (it.operarios||[]).map(o=>o.nombre||'');
  numOperarios = Math.max(opsBD.length, 2);
  _initialOperarios = opsBD;

  // Horas precargadas desde BD
  const horasBD = it.horas || [];
  numHoras = Math.max(horasBD.length, 3);
  _initialHoras = horasBD;

  // Gastos precargados desde BD
  _initialGastos = it.gastos || [];

  fotosData = [];
  renderOperarioRows();
  renderHorasRows();
  setTimeout(()=>document.getElementById('f_gps')?.focus(), 60);
}

let numOperarios = 2;
let numHoras = 3;
let fotosData = [];
let _initialOperarios = [];
let _initialHoras = [];
let _initialGastos = [];

function handleFotos(input){
  const files = [...input.files];
  let loaded = 0;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      fotosData.push({ name: file.name, dataUrl: ev.target.result });
      loaded++;
      if(loaded === files.length) renderFotosPreview();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderFotosPreview(){
  const c = document.getElementById('fotosPreview');
  if(!c) return;
  c.innerHTML = fotosData.map((f,i)=>`
    <div class="foto-thumb">
      <img src="${f.dataUrl}" alt="${esc(f.name)}">
      <button class="foto-remove" onclick="removeFoto(${i})" title="Eliminar">×</button>
    </div>`).join('');
}

function removeFoto(i){
  fotosData.splice(i,1);
  renderFotosPreview();
}

function renderHorasRows(){
  const container = document.getElementById('horasRows');
  if(!container) return;
  const existing = [...container.querySelectorAll('.tbl-row')].map(row=>[...row.querySelectorAll('input')].map(i=>i.value));
  container.innerHTML = '';
  for(let n=0;n<numHoras;n++){
    const pre = _initialHoras[n] || {};
    const vals = existing[n] || [];
    const dia   = vals[0] !== undefined ? vals[0] : (pre.dia||'');
    const ini   = vals[1] !== undefined ? vals[1] : (pre.inicio||'');
    const fin   = vals[2] !== undefined ? vals[2] : (pre.final||'');
    const ops   = vals[3] !== undefined ? vals[3] : (pre.operarios||'');
    const def   = vals[4] !== undefined ? vals[4] : (pre.definicion||'');
    const div = document.createElement('div');
    div.className = 'tbl-row';
    div.style.gridTemplateColumns = '60px 70px 70px 55px 1fr';
    div.innerHTML = `
      <div class="td"><input type="text" placeholder="dd/mm" value="${esc(dia)}"></div>
      <div class="td"><input type="text" placeholder="08:00" value="${esc(ini)}"></div>
      <div class="td"><input type="text" placeholder="14:00" value="${esc(fin)}"></div>
      <div class="td"><input type="text" placeholder="1" style="text-align:center" value="${esc(ops)}"></div>
      <div class="td"><input type="text" placeholder="" value="${esc(def)}"></div>`;
    container.appendChild(div);
  }
  const btn = document.getElementById('btnRemoveHora');
  if(btn) btn.disabled = numHoras<=1;
}

function addHora(){ numHoras++; renderHorasRows(); }
function removeHora(){ if(numHoras<=1) return; numHoras--; renderHorasRows(); }

function renderOperarioRows(){
  const container = document.getElementById('operariosRows');
  if(!container) return;
  const existing = [...container.querySelectorAll('.op-row input')].map(i=>i.value);
  container.innerHTML = '';
  for(let n=1;n<=numOperarios;n++){
    const preNombre = _initialOperarios[n-1] || '';
    const nombre = existing[n-1] !== undefined ? existing[n-1] : preNombre;
    const div = document.createElement('div');
    div.className = 'frow frow-1 op-row';
    div.innerHTML = `<div class="fcell"><span class="flbl" style="width:18px">${n}º</span><input class="fi" placeholder="Nombre operario ${n}" value="${esc(nombre)}"></div>`;
    container.appendChild(div);
  }
  const btn = document.getElementById('btnRemoveOp');
  if(btn) btn.disabled = numOperarios<=1;
  renderGastos();
}

function renderGastos(){
  const block = document.getElementById('gastosBlock');
  if(!block) return;
  const existing = [...block.querySelectorAll('.gastos-op')].map(op=>[...op.querySelectorAll('input')].map(i=>i.value));
  block.innerHTML = '';
  for(let n=1;n<=numOperarios;n++){
    const vals = existing[n-1] || [];
    const pre = _initialGastos[n-1] || {};
    const get = (idx, key) => vals[idx] !== undefined ? vals[idx] : (pre[key]||'');
    const div = document.createElement('div');
    div.className = 'gastos-op';
    div.innerHTML = `<div class="gastos-op-hdr">${n}º Operario</div>`+
      [['Km.','km_cant','km_total'],['Dietas','dietas_cant','dietas_total'],['Comidas','comidas_cant','comidas_total']].map(([label,kc,kt],ci)=>`
        <div class="gastos-row">
          <div class="glbl">${label}</div>
          <div class="gval"><input type="number" placeholder="Cant." min="0" step="0.1" value="${get(ci*2,kc)}"></div>
          <div class="gtot"><input type="number" placeholder="Total" min="0" step="0.01" value="${get(ci*2+1,kt)}"></div>
        </div>`).join('');
    block.appendChild(div);
  }
}

function addOperario(){
  numOperarios++;
  renderOperarioRows();
}

function removeOperario(){
  if(numOperarios<=1) return;
  numOperarios--;
  renderOperarioRows();
}

function addConcepto(){
  const container = document.getElementById('conceptosRows');
  const row = document.createElement('div');
  row.className = 'tbl-row';
  row.style.gridTemplateColumns = '42px 1fr';
  row.innerHTML = `
    <div class="td"><input type="number" value="1" min="0" style="width:100%;text-align:center"></div>
    <div class="td"><input type="text" placeholder="Descripción del trabajo…"></div>`;
  container.appendChild(row);
}

function resetDoc(){
  document.getElementById('docCard').classList.remove('filled');
  document.getElementById('editBadge').style.display='none';
  _initialOperarios = []; _initialHoras = []; _initialGastos = [];
  const idEl = document.getElementById('docIdParte');
  if(idEl){ idEl.style.display='none'; idEl.textContent=''; }
  document.getElementById('docBody').innerHTML=`
    <div class="doc-empty">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
      <p>Selecciona un parte<br>para generar el PDF</p>
    </div>`;
}

async function generarPDF(){
  const btn = document.getElementById('btnGenerar');
  btn.disabled = true;

  // Collect conceptos (only filled rows)
  const conceptos = [];
  document.querySelectorAll('#conceptosRows .tbl-row').forEach(row=>{
    const inputs = row.querySelectorAll('input');
    const cant = inputs[0]?.value||'', concepto = inputs[1]?.value||'';
    if(cant||concepto) conceptos.push({ cant, concepto });
  });

  // Collect horas
  const horas = [];
  document.querySelectorAll('#horasRows .tbl-row').forEach(row=>{
    const inputs = row.querySelectorAll('input');
    const h = { dia:inputs[0]?.value||'', inicio:inputs[1]?.value||'', final:inputs[2]?.value||'', operarios:inputs[3]?.value||'', definicion:inputs[4]?.value||'' };
    if(h.dia||h.inicio||h.final||h.definicion) horas.push(h);
  });

  // Collect operarios
  const operarios = [...document.querySelectorAll('#operariosRows .op-row input')].map(i=>({nombre:i.value||''}));

  // Collect gastos
  const gastos = [];
  document.querySelectorAll('.gastos-op').forEach((op,i)=>{
    const rows = op.querySelectorAll('.gastos-row');
    const g = {op: i+1, km_cant:'', km_total:'', dietas_cant:'', dietas_total:'', comidas_cant:'', comidas_total:''};
    rows.forEach((r,j)=>{
      const inputs = r.querySelectorAll('input');
      if(j===0){g.km_cant=inputs[0]?.value||''; g.km_total=inputs[1]?.value||'';}
      if(j===1){g.dietas_cant=inputs[0]?.value||''; g.dietas_total=inputs[1]?.value||'';}
      if(j===2){g.comidas_cant=inputs[0]?.value||''; g.comidas_total=inputs[1]?.value||'';}
    });
    gastos.push(g);
  });

  const payload = {
    albaran:     v('f_albaran'),
    presupuesto: v('f_presupuesto'),
    cliente:     v('f_cliente'),
    direccion:   v('f_direccion'),
    localidad:   v('f_localidad'),
    contacto:    v('f_contacto'),
    gps:         v('f_gps'),
    fecha:       v('f_fecha'),
    observaciones: v('f_obs'),
    conceptos, horas, operarios, gastos, fotos: fotosData,
  };

  try{
    const res = await fetch('/api/generar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!res.ok) throw new Error();
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`Parte_${payload.albaran.replace('/','-')}.pdf`; a.click();
    URL.revokeObjectURL(url);
    showToast('✓ PDF descargado correctamente','ok');
    fetch('/api/siguiente-numero').then(r=>r.json()).then(d=>{nextNum=d.formato; const el=document.getElementById('f_albaran'); if(el) el.value=nextNum;});
  }catch{
    showToast('Error al generar el PDF','');
  }finally{
    btn.disabled=false;
  }
}

function v(id){ const el=document.getElementById(id); return el?.value||''; }

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type?' '+type:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}
function esc(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
